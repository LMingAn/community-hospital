<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线预约 - 社区医院在线预约管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
  <div class="container topbar-inner">
    <div class="brand">社区医院在线预约管理系统<small>在线预约挂号</small></div>
    <nav class="nav">
      <a href="/index.html">首页</a>
      <a class="active" href="/booking.html">在线预约</a>
      <a href="/query.html">预约查询</a>
      <a href="/departments.html">科室与医生</a>
      <a id="manageEntry" class="hidden" href="/admin-dashboard.html">后台管理</a>
      <a id="loginEntry" href="/admin-login.html?returnTo=%2Fbooking.html">管理员登录</a>
      <span id="adminArea" class="hidden"><button id="logoutBtn" class="link-btn">注销</button></span>
    </nav>
  </div>
</header>
<main class="section">
  <div class="container">
    <div class="card">
      <h1 class="page-title">在线预约</h1>
      <p class="page-subtitle">请按顺序填写患者信息、选择科室、医生和时间段完成预约。</p>
      <div id="messageBox" class="notice hidden"></div>
      <form id="bookingForm">
        <div class="form-row">
          <div class="form-group"><label>患者姓名</label><input name="patientName" required></div>
          <div class="form-group"><label>性别</label>
            <select name="gender" required>
              <option value="">请选择性别</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>年龄</label><input type="number" min="0" max="120" name="age" required></div>
          <div class="form-group"><label>手机号</label><input name="phone" required></div>
        </div>
        <div class="form-group"><label>身份证号（可选）</label><input name="idCard"></div>
        <div class="form-row">
          <div class="form-group"><label>选择科室</label><select id="departmentId" name="departmentId" required><option value="">加载中</option></select></div>
          <div class="form-group"><label>选择医生</label><select id="doctorId" name="doctorId" required><option value="">请先选择科室</option></select></div>
        </div>
        <div class="form-group"><label>选择时段</label><select id="scheduleId" name="scheduleId" required><option value="">请先选择医生</option></select></div>
        <div class="form-group"><label>主要症状</label><textarea name="symptom" required placeholder="请简要描述就诊原因"></textarea></div>
        <div class="right-actions">
          <button type="reset" class="btn secondary">重置</button>
          <button type="submit" class="btn">提交预约</button>
        </div>
      </form>
    </div>
  </div>
</main>
<footer class="footer"><div class="container">请保留预约成功后的预约编号用于查询</div></footer>
<script src="/js/common.js"></script>
<script src="/js/booking.js"></script>
</body>
</html>
