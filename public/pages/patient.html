<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>患者中心</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<header class="header"><div class="topbar"><div class="brand"><h1>患者中心</h1><p>挂号、取消、就诊记录、住院登记、充值</p></div><nav class="nav"><a href="/index.html">首页</a><a class="active" href="/pages/patient.html">患者中心</a><a href="/pages/doctor.html">医生中心</a><a href="/pages/login.html">管理员登录</a><a href="/pages/admin.html">后台管理</a></nav></div></header>
<main class="container">
<div class="grid-2">
  <section class="card">
    <h3>患者登录 / 注册</h3>
    <div id="patientNotice" class="notice"></div>
    <div class="grid-2">
      <form id="patientLoginForm" class="list-card">
        <strong>患者登录</strong>
        <div class="form-group"><label>用户名</label><input name="username" required></div>
        <div class="form-group"><label>密码</label><input name="password" type="password" required></div>
        <button class="btn" type="submit">登录</button>
        <button class="btn-secondary" type="button" id="patientLogoutBtn">退出登录</button>
      </form>
      <form id="patientRegisterForm" class="list-card">
        <strong>患者注册</strong>
        <div class="form-row">
          <div class="form-group"><label>用户名</label><input name="username" required></div>
          <div class="form-group"><label>姓名</label><input name="name" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>性别</label><select name="gender"><option value="男">男</option><option value="女">女</option></select></div>
          <div class="form-group"><label>年龄</label><input name="age" type="number"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>手机号</label><input name="phone" required></div>
          <div class="form-group"><label>身份证号</label><input name="idCard"></div>
        </div>
        <div class="form-group"><label>密码</label><input name="password" type="password" required></div>
        <button class="btn" type="submit">注册</button>
      </form>
    </div>
  </section>
  <section class="card">
    <h3>个人信息与充值</h3>
    <div id="profileBox" class="list-card muted">请先登录患者账号</div>
    <form id="rechargeForm" class="list-card" style="margin-top:12px;">
      <strong>在线充值</strong>
      <div class="form-row"><div class="form-group"><label>充值金额</label><input name="amount" type="number" min="1" step="0.01" required></div><div class="form-group" style="display:flex;align-items:flex-end;"><button class="btn" type="submit">立即充值</button></div></div>
    </form>
    <form id="patientPwdForm" class="list-card" style="margin-top:12px;">
      <strong>修改密码</strong>
      <div class="form-row"><div class="form-group"><label>原密码</label><input name="oldPassword" type="password" required></div><div class="form-group"><label>新密码</label><input name="newPassword" type="password" required></div></div>
      <button class="btn-secondary" type="submit">修改密码</button>
    </form>
  </section>
</div>

<section class="card" style="margin-top:22px;">
  <h3>当天医生挂号</h3>
  <div id="bookingNotice" class="notice"></div>
  <div class="form-row">
    <div class="form-group"><label>就诊日期</label><input id="visitDate" type="date"></div>
    <div class="form-group"><label>症状描述（用于分诊建议）</label><input id="symptomInput" placeholder="如：发热、咳嗽、高血压复诊"></div>
  </div>
  <button class="btn" id="loadTodayDoctorsBtn" type="button">查询可挂号医生</button>
  <button class="btn-secondary" id="triageBtn" type="button">智能分诊</button>
  <div id="triageResult" class="muted" style="margin:12px 0;"></div>
  <div id="todayDoctorCards" class="grid-3"></div>
</section>

<section class="grid-2" style="margin-top:22px;">
  <div class="card"><h3>我的挂号</h3><div class="table-wrap"><table><thead><tr><th>单号</th><th>就诊信息</th><th>状态</th><th>操作</th></tr></thead><tbody id="appointmentTable"></tbody></table></div></div>
  <div class="card"><h3>我的就诊 / 住院</h3><div id="visitList"></div><hr><div id="hospitalList"></div></div>
</section>
</main>
<footer class="footer">患者端支持叫号前取消挂号；叫号后进入医生接诊流程。</footer>
<script src="/js/common.js"></script>
<script>
let patientLoggedIn = false;
async function refreshPatientProfile() {
  try {
    const res = await request('/api/auth/patient/profile');
    patientLoggedIn = true;
    const p = res.data;
    setHtml('profileBox', `<p><strong>${p.name}</strong>（${p.username}）</p><p>性别：${p.gender}｜年龄：${p.age || '-'}｜手机号：${p.phone}</p><p>身份证号：${p.idCard || '-'}</p><p>账户余额：<strong>${Number(p.balance).toFixed(2)}</strong> 元</p>`);
  } catch {
    patientLoggedIn = false;
    setHtml('profileBox', '<div class="muted">请先登录患者账号</div>');
  }
}
async function loadMyAppointments() {
  if (!patientLoggedIn) return setHtml('appointmentTable', '<tr><td colspan="4" class="muted">请先登录</td></tr>');
  const res = await request('/api/patient/appointments');
  setHtml('appointmentTable', res.data.map(i => `<tr><td>${i.appointmentNo}</td><td>${i.visitDate} ${i.period}<br>${i.departmentName} / ${i.doctorName}<br>排队号：${i.queueNo}</td><td><span class="badge ${badgeClass(i.status)}">${i.status}</span></td><td>${i.status === '待叫号' ? `<button class="btn-danger" onclick="cancelAppointment(${i.id})">取消</button>` : ''}</td></tr>`).join('') || '<tr><td colspan="4" class="muted">暂无挂号记录</td></tr>');
}
async function loadVisits() {
  if (!patientLoggedIn) { setHtml('visitList','<p class="muted">请先登录</p>'); setHtml('hospitalList','<p class="muted">请先登录</p>'); return; }
  const visits = await request('/api/patient/visits');
  const hospitals = await request('/api/patient/hospitalizations');
  setHtml('visitList', '<strong>我的就诊记录</strong>' + (visits.data.map(i => `<div class="list-card" style="margin-top:10px;"><p>就诊单号：${i.appointmentNo}｜医生：${i.doctorName}</p><p>诊断：${i.diagnosis || '-'}</p><div>${i.adviceHtml || '<span class="muted">暂无医嘱</span>'}</div><p>处方：${i.prescription || '-'}</p></div>`).join('') || '<p class="muted">暂无就诊记录</p>'));
  setHtml('hospitalList', '<strong>住院登记信息</strong>' + (hospitals.data.map(i => `<div class="list-card" style="margin-top:10px;"><p>状态：<span class="badge ${badgeClass(i.status)}">${i.status}</span></p><p>病区：${i.wardNo || '-'}｜床位：${i.bedNo || '-'}</p><p>原因：${i.reasonText || '-'}</p></div>`).join('') || '<p class="muted">暂无住院登记</p>'));
}
async function loadTodayDoctors() {
  if (!patientLoggedIn) return showNotice('bookingNotice','请先登录患者账号后再挂号','error');
  const date = document.getElementById('visitDate').value;
  const res = await request(`/api/patient/today-doctors?date=${date}`);
  setHtml('todayDoctorCards', res.data.map(i => `<div class="list-card"><p><strong>${i.doctorName}</strong>｜${i.title}</p><p>${i.departmentName}｜${i.period}</p><p>挂号费：${i.fee} 元，余号：${i.remainingNumber}/${i.maxNumber}</p><p>擅长：${i.specialty || '-'}</p><button class="btn" onclick='bookDoctor(${JSON.stringify({doctorId: i.doctorId, departmentId: i.departmentId, period: i.period, visitDate: i.visitDate}).replace(/'/g, "&#39;")})'>立即挂号</button></div>`).join('') || '<p class="muted">所选日期暂无医生坐诊</p>');
}
async function bookDoctor(item) {
  try {
    const symptom = document.getElementById('symptomInput').value;
    const res = await request('/api/patient/appointments', { method:'POST', body: JSON.stringify({ ...item, symptom }) });
    showNotice('bookingNotice', `挂号成功，预约单号：${res.data.appointmentNo}，排队号：${res.data.queueNo}`, 'success');
    loadMyAppointments();
    loadTodayDoctors();
  } catch (e) { showNotice('bookingNotice', e.message, 'error'); }
}
async function cancelAppointment(id) {
  try { await request(`/api/patient/appointments/${id}/cancel`, { method:'PATCH' }); await loadMyAppointments(); showNotice('bookingNotice','挂号已取消','success'); } catch (e) { showNotice('bookingNotice', e.message, 'error'); }
}

document.getElementById('patientLoginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const form = new FormData(e.target);
  try { await request('/api/auth/patient/login', { method:'POST', body: JSON.stringify(Object.fromEntries(form)) }); showNotice('patientNotice','患者登录成功','success'); await refreshPatientProfile(); await loadMyAppointments(); await loadVisits(); } catch (err) { showNotice('patientNotice', err.message, 'error'); }
});
document.getElementById('patientRegisterForm').addEventListener('submit', async e => {
  e.preventDefault();
  const form = new FormData(e.target);
  try { await request('/api/auth/patient/register', { method:'POST', body: JSON.stringify(Object.fromEntries(form)) }); showNotice('patientNotice','患者注册成功，请直接登录','success'); e.target.reset(); } catch (err) { showNotice('patientNotice', err.message, 'error'); }
});
document.getElementById('patientLogoutBtn').addEventListener('click', async ()=>{ await request('/api/auth/patient/logout', { method:'POST' }); patientLoggedIn=false; refreshPatientProfile(); loadMyAppointments(); loadVisits(); showNotice('patientNotice','已退出登录','info'); });
document.getElementById('rechargeForm').addEventListener('submit', async e=>{ e.preventDefault(); try { const form=new FormData(e.target); await request('/api/patient/recharge',{method:'POST',body:JSON.stringify({amount:form.get('amount')})}); showNotice('patientNotice','充值成功','success'); refreshPatientProfile(); e.target.reset(); } catch(err){ showNotice('patientNotice',err.message,'error'); } });
document.getElementById('patientPwdForm').addEventListener('submit', async e=>{ e.preventDefault(); try { const form=new FormData(e.target); await request('/api/auth/patient/password',{method:'PATCH',body:JSON.stringify(Object.fromEntries(form))}); showNotice('patientNotice','密码修改成功','success'); e.target.reset(); } catch(err){ showNotice('patientNotice',err.message,'error'); } });
document.getElementById('triageBtn').addEventListener('click', async ()=>{ const symptom=document.getElementById('symptomInput').value; const res=await request('/api/triage',{method:'POST',body:JSON.stringify({symptom})}); document.getElementById('triageResult').innerHTML=`分诊建议：<strong>${res.data.department}</strong>，${res.data.advice}`; });
document.getElementById('visitDate').value = new Date().toISOString().slice(0,10);
document.getElementById('loadTodayDoctorsBtn').addEventListener('click', loadTodayDoctors);
refreshPatientProfile().then(()=>{ loadMyAppointments(); loadVisits(); });
</script>
</body></html>
