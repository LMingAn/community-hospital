<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>管理员登录</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<header class="header"><div class="topbar"><div class="brand"><h1>管理员登录</h1><p>登录成功后返回来源页面；未登录访问后台会自动跳转此页</p></div><nav class="nav"><a href="/index.html">首页</a><a href="/pages/patient.html">患者中心</a><a href="/pages/doctor.html">医生中心</a><a class="active" href="/pages/login.html">管理员登录</a><a href="/pages/admin.html">后台管理</a></nav></div></header>
<main class="container"><div class="card" style="max-width:460px;margin:0 auto;"><h3>管理员账号登录</h3><div id="adminNotice" class="notice"></div><form id="adminLoginForm"><div class="form-group"><label>管理员账号</label><input name="username" required value="admin"></div><div class="form-group"><label>密码</label><input name="password" type="password" required value="123456"></div><button class="btn" type="submit">登录</button></form></div></main>
<footer class="footer">默认管理员：admin / 123456</footer>
<script src="/js/common.js"></script><script>
document.getElementById('adminLoginForm').addEventListener('submit', async e=>{ e.preventDefault(); const form=new FormData(e.target); try{ await request('/api/auth/admin/login',{method:'POST',body:JSON.stringify(Object.fromEntries(form))}); const back = getQueryParam('redirect') || '/index.html'; window.location.href = back; }catch(err){ showNotice('adminNotice',err.message,'error'); } });</script>
</body></html>
