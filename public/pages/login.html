<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>管理员登录</title><link rel="stylesheet" href="/css/style.css" /></head>
<body>
<header class="header"><div class="topbar"><div class="brand"><h1>管理员登录</h1><p>登录后返回来源页面，并可进入后台管理</p></div><nav class="nav"><a href="/index.html">首页</a><a href="/pages/appointment.html">在线预约</a><a href="/pages/query.html">预约查询</a><a href="/pages/doctors.html">科室医生</a><a href="/pages/admin.html">后台管理</a></nav></div></header>
<main class="container"><div class="card login-box"><h3>管理员账号登录</h3><div id="loginNotice" class="notice"></div><div class="form-group"><label>账号</label><input id="username" value="admin" /></div><div class="form-group"><label>密码</label><input id="password" type="password" value="123456" /></div><button class="btn" id="loginBtn">登录</button><p class="muted">未登录访问后台管理页时将自动跳转至此页面。</p></div></main>
<footer class="footer">默认管理员账号：admin / 123456</footer>
<script src="/js/common.js"></script>
<script>
document.getElementById('loginBtn').addEventListener('click', async () => {
  clearNotice('loginNotice');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  try {
    await request('/api/admin/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    const redirect = getQueryParam('redirect') || '/index.html';
    window.location.href = redirect;
  } catch (error) {
    showNotice('loginNotice', error.message, 'error');
  }
});
</script>
</body>
</html>
