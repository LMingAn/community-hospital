<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线预约</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="header"><div class="topbar"><div class="brand"><h1>在线预约</h1><p>请按步骤完成预约信息填写</p></div><nav class="nav"><a href="/index.html">首页</a><a class="active" href="/pages/appointment.html">在线预约</a><a href="/pages/query.html">预约查询</a><a href="/pages/doctors.html">科室医生</a><a href="/pages/admin.html">后台管理</a><a id="loginEntry" href="/pages/login.html?redirect=/pages/appointment.html">管理员登录</a><button id="logoutEntry" style="display:none;">注销</button></nav></div></header>
<main class="container">
  <h2 class="section-title">预约挂号</h2>
  <div class="grid-2">
    <section class="card">
      <h3>分诊建议</h3>
      <div id="triageNotice" class="notice"></div>
      <div class="form-group"><label>症状描述</label><textarea id="symptomInput" placeholder="例如：发热、咳嗽三天，伴有咽痛"></textarea></div>
      <button class="btn-secondary" id="triageBtn">获取分诊建议</button>
      <div id="triageResult" style="margin-top:14px;"></div>
    </section>
    <section class="card">
      <h3>填写预约表单</h3>
      <div id="appointNotice" class="notice"></div>
      <form id="appointmentForm">
        <div class="form-row">
          <div class="form-group"><label>姓名</label><input id="patientName" required /></div>
          <div class="form-group"><label>性别</label><select id="gender"><option value="男">男</option><option value="女">女</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>年龄</label><input id="age" type="number" min="0" max="120" /></div>
          <div class="form-group"><label>手机号</label><input id="phone" required /></div>
        </div>
        <div class="form-group"><label>身份证号</label><input id="idCard" /></div>
        <div class="form-row">
          <div class="form-group"><label>选择科室</label><select id="departmentSelect" required><option value="">请选择科室</option></select></div>
          <div class="form-group"><label>选择医生</label><select id="doctorSelect" required><option value="">请先选择科室</option></select></div>
        </div>
        <div class="form-group"><label>选择号源</label><select id="scheduleSelect" required><option value="">请先选择医生</option></select></div>
        <div class="form-group"><label>症状补充</label><textarea id="symptom"></textarea></div>
        <button class="btn" type="submit">提交预约</button>
      </form>
    </section>
  </div>
</main>
<footer class="footer">请确保预约信息填写真实准确</footer>
<script src="/js/common.js"></script>
<script>
let schedules = [];

async function loadDepartments() {
  const res = await request('/api/departments');
  const select = document.getElementById('departmentSelect');
  select.innerHTML = '<option value="">请选择科室</option>' + res.data.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
}

async function loadDoctors(departmentId) {
  const res = await request(`/api/doctors?departmentId=${departmentId}`);
  const select = document.getElementById('doctorSelect');
  select.innerHTML = '<option value="">请选择医生</option>' + res.data.map(d => `<option value="${d.id}">${d.name}（${d.title}）</option>`).join('');
  document.getElementById('scheduleSelect').innerHTML = '<option value="">请先选择医生</option>';
}

async function loadSchedules(doctorId) {
  const res = await request(`/api/schedules/${doctorId}`);
  schedules = res.data;
  const select = document.getElementById('scheduleSelect');
  if (!schedules.length) {
    select.innerHTML = '<option value="">暂无可预约号源</option>';
    return;
  }
  select.innerHTML = '<option value="">请选择号源</option>' + schedules.map(s => `<option value="${s.id}">${s.scheduleDate} ${s.period} ｜ 剩余${s.remainingNumber}号 ｜ ${s.heatLevel} ｜ 挂号费${s.fee}元</option>`).join('');
}

document.getElementById('departmentSelect').addEventListener('change', (e) => {
  if (e.target.value) loadDoctors(e.target.value);
});
document.getElementById('doctorSelect').addEventListener('change', (e) => {
  if (e.target.value) loadSchedules(e.target.value);
});
document.getElementById('triageBtn').addEventListener('click', async () => {
  clearNotice('triageNotice');
  const symptom = document.getElementById('symptomInput').value.trim();
  const res = await request('/api/triage', { method: 'POST', body: JSON.stringify({ symptom }) });
  const { department, level, advice } = res.data;
  document.getElementById('triageResult').innerHTML = `<p><strong>推荐科室：</strong>${department}</p><p><strong>优先级：</strong>${level}</p><p><strong>建议：</strong>${advice}</p>`;
  showNotice('triageNotice', '已生成分诊建议，可据此选择科室。', 'success');
});

document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearNotice('appointNotice');
  const scheduleId = document.getElementById('scheduleSelect').value;
  const selected = schedules.find(item => String(item.id) === String(scheduleId));
  if (!selected) return showNotice('appointNotice', '请选择有效号源', 'error');
  const payload = {
    patientName: document.getElementById('patientName').value.trim(),
    gender: document.getElementById('gender').value,
    age: document.getElementById('age').value,
    phone: document.getElementById('phone').value.trim(),
    idCard: document.getElementById('idCard').value.trim(),
    symptom: document.getElementById('symptom').value.trim(),
    departmentId: document.getElementById('departmentSelect').value,
    doctorId: document.getElementById('doctorSelect').value,
    scheduleId,
    visitDate: selected.scheduleDate,
    period: selected.period
  };
  try {
    const res = await request('/api/appointments', { method: 'POST', body: JSON.stringify(payload) });
    showNotice('appointNotice', `预约成功，预约单号：${res.data.appointmentNo}`, 'success');
    e.target.reset();
  } catch (error) {
    showNotice('appointNotice', error.message, 'error');
  }
});

loadDepartments();
</script>
</body>
</html>
